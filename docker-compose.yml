version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartlink
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartlink || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point the app at the local Postgres instance to mirror production parity.
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/smartlink"
      BASE_URL: "http://localhost:5000"
      # Helpful dev flags (override in env as needed)
      FLASK_ENV: development
      # Ensure cookie secure flag derives from BASE_URL (app uses that logic)
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/ || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 12
    restart: on-failure

volumes:
  db_data: