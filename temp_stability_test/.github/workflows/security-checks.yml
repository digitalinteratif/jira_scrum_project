name: security-checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  security:
    name: Security & Quick Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install minimal tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Ruff linter
        run: |
          echo "Running ruff..."
          ruff check .

      - name: Pytest (fast)
        run: |
          echo "Running pytest (fast subset)..."
          # Running full test suite may be slow; adjust as necessary.
          pytest -q || { echo "pytest failed"; exit 1; }

      - name: Run security scanner script
        run: |
          chmod +x scripts/security_scan.sh || true
          ./scripts/security_scan.sh

      - name: Run python pattern checker (redundant safety)
        run: |
          python3 scripts/check_security.py

      # Optional secrets scanning (commented out by default)
      # - name: truffleHog secret scan (optional)
      #   uses: trufflesecurity/trufflehog@v2.5.0
      #   with:
      #     args: --regex --entropy=False

    # Make this job required via branch protection if desired in repository settings
--- END FILE: .github/workflows/security-checks.yml ---