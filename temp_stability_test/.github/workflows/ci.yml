name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  # 1) LINT — fast, single-python-version job to catch style issues early
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-py3.12
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          # Tools required by lint job
          pip install ruff flake8

      - name: Run ruff (fast)
        run: |
          # ruff will exit non-zero on issues
          ruff check .

      - name: Run flake8 (defensive)
        run: |
          # keep a flake8 run for projects relying on it (optional)
          flake8 .

      - name: Archive linter output (best-effort)
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs
          path: |
            # ruff and flake8 do not create files by default; still upload workspace for debug
            .

  # 2) UNIT TESTS — matrix for python versions (can be expanded)
  unit_tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-py${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test-associated tools exist
          pip install pytest pytest-cov

      - name: Prepare reports directory
        run: mkdir -p reports || true

      - name: Run unit tests (pytest)
        run: |
          # Prefer an explicit path: tests/unit; if repo uses different layout adjust as-needed
          # If tests are not separated by folder, use -k "not integration" or configure markers
          if [ -d "app_core/tests" ]; then
            pytest app_core/tests -q -m "not integration" --junitxml=reports/unit-junit-${{ matrix.python-version }}.xml || (exit_code=$?; echo "pytest exit=$exit_code" && exit $exit_code)
          else
            pytest tests/unit -q --junitxml=reports/unit-junit-${{ matrix.python-version }}.xml || (exit_code=$?; echo "pytest exit=$exit_code" && exit $exit_code)
          fi

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.python-version }}
          path: reports/unit-junit-${{ matrix.python-version }}.xml

  # 3) INTEGRATION TESTS — run after unit tests; runs separately so long/flaky tests are isolated
  integration_tests:
    name: Integration Tests
    needs: unit_tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: [ "3.12" ]
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-py${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Prepare integration DB path and env
        run: |
          # Use a workspace-local sqlite file for integration tests to persist across steps in same job
          mkdir -p ci_workdir
          echo "CI workspace: $PWD"
        env:
          CI_WORKDIR: ${{ github.workspace }}/ci_workdir

      - name: Set DATABASE_URL for integration tests
        id: dbenv
        run: |
          # For an absolute filesystem path use 3 slashes. Point integration DB to workspace so artifacts remain
          export DB_PATH="${{ github.workspace }}/ci_workdir/ci_integration.db"
          echo "DB_PATH=$DB_PATH"
          echo "DATABASE_URL=sqlite:///$DB_PATH" >> $GITHUB_ENV
          # ensure old db removed for idempotency
          rm -f "$DB_PATH" || true

      - name: Prepare reports dir
        run: mkdir -p reports || true

      - name: Run integration tests (pytest)
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          # Run only integration tests. Project should mark integration tests accordingly, e.g. pytest -m integration
          if [ -d "app_core/tests" ]; then
            pytest app_core/tests -q -m integration --junitxml=reports/integration-junit.xml -k "integration" || (exit_code=$?; echo "integration pytest exit=$exit_code" && exit $exit_code)
          else
            pytest tests/integration -q --junitxml=reports/integration-junit.xml || (exit_code=$?; echo "integration pytest exit=$exit_code" && exit $exit_code)
          fi

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: reports/integration-junit.xml

      - name: Upload integration DB (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-db-on-failure
          path: ${{ github.workspace }}/ci_workdir/ci_integration.db