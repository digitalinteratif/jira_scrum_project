version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kan151_staging_app:latest
    container_name: kan151_staging_app
    ports:
      - "5000:5000"
    environment:
      # Recommended: load app-specific envs from host .env via docker-compose --env-file .env (runbook shows usage)
      # Minimal safe defaults for local staging if .env not provided
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL:-sqlite:///shortener.db}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:5000/health || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: "no"
    # Do not mount host volume by default to keep staging closer to image behavior.
    # For very fast iterative dev, developers may mount code in local docker-compose.override.yml (optional).
--- END FILE: docker-compose.yml ---