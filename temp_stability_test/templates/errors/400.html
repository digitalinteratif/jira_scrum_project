<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bad Request</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:#fbfbfb;color:#111;margin:0;padding:2rem}
    .container{max-width:720px;margin:0 auto;background:#fff;padding:1.5rem;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .alert{color:#b00020;margin-bottom:1rem}
    a.button{display:inline-block;padding:.5rem 1rem;background:#0b63d8;color:#fff;border-radius:6px;text-decoration:none}
    .prefill{margin-top:1rem;padding:.75rem;background:#f8f9fb;border-radius:6px}
    label{display:block;margin-top:.5rem;font-weight:600}
    input{width:100%;padding:.5rem;border:1px solid #ddd;border-radius:6px}
  </style>
</head>
<body>
  <main class="container" id="main-content" tabindex="-1">
    <h1>Bad Request</h1>
    <p class="alert" role="alert" aria-live="assertive">{{ message }}</p>

    <p>If you were submitting a form, please review the highlighted fields and try again.</p>

    {% set pf = prefill or {} %}
    {% if pf.email or request.form.get('email') %}
      <div class="prefill" aria-live="polite">
        <h2>Fields we kept for you</h2>
        <form>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" readonly value="{{ pf.get('email') or request.form.get('email')|e }}">
        </form>
      </div>
    {% endif %}

    <p style="margin-top:1rem">
      <a class="button" href="javascript:history.back()">Go back</a>
      <a style="margin-left:.5rem" href="/">Home</a>
    </p>
  </main>
</body>
</html>
--- END FILE: templates/errors/400.html ---
