<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In — URL Shortener</title>
  <style>
    /* Minimal accessible styles to keep page readable during tests */
    body { font-family: Arial, sans-serif; background:#f7fafc; color:#111; margin:0; padding:0; }
    .container { max-width:640px; margin:3rem auto; background:#fff; border:1px solid #e6edf3; border-radius:8px; padding:1.5rem; box-shadow:0 1px 2px rgba(0,0,0,0.04);}
    label { display:block; margin-bottom:0.25rem; font-weight:600; }
    input[type="email"], input[type="password"] { width:100%; padding:0.6rem; margin-bottom:0.75rem; border:1px solid #d5e0e9; border-radius:6px; font-size:1rem; }
    .error { background:#ffe8e8; color:#7a1f1f; padding:0.75rem; border-radius:6px; margin-bottom:0.75rem; }
    button { background:#2563eb; color:#fff; padding:0.6rem 1rem; border:none; border-radius:6px; cursor:pointer; font-size:1rem; }
    .meta { margin-top:0.75rem; font-size:0.9rem; color:#556; display:flex; justify-content:space-between; align-items:center;}
    a { color:#2563eb; text-decoration:none; }
    .skip-link { position:absolute; left:-999px; top:auto; width:1px; height:1px; overflow:hidden; }
    .skip-link:focus { left:1rem; top:1rem; width:auto; height:auto; padding:0.5rem 1rem; background:#000; color:#fff; border-radius:4px; z-index:1000; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <main id="main-content" class="container" role="main" aria-labelledby="login-heading">
    <h1 id="login-heading" style="margin-top:0; font-size:1.5rem;">Sign in to your account</h1>

    {% if error %}
      <div class="error" role="alert" aria-live="assertive">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div>
        <label for="login-email">Email address</label>
        <input id="login-email" name="email" type="email" required autocomplete="email" value="{{ email|e }}" placeholder="you@example.com" />
      </div>

      <div>
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required minlength="8" autocomplete="current-password" placeholder="Your password" />
      </div>

      <div class="meta">
        <div><label style="font-weight:normal;"><input type="checkbox" name="remember" value="1"> Remember me</label></div>
        <div><a href="{{ url_for('auth.register') }}">Create account</a></div>
      </div>

      <div style="margin-top:1rem;">
        <button type="submit">Sign in</button>
      </div>
    </form>
  </main>
</body>
</html>
