<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Unauthorized</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:#fff;color:#111;margin:0;padding:2rem}
    .container{max-width:720px;margin:0 auto;padding:1.5rem}
    .alert{color:#b00020;margin-bottom:1rem}
    a.button{display:inline-block;padding:.5rem 1rem;background:#0b63d8;color:#fff;border-radius:6px;text-decoration:none}
  </style>
</head>
<body>
  <main class="container" id="main-content" tabindex="-1">
    <h1>Unauthorized</h1>
    <p class="alert" role="alert" aria-live="assertive">{{ message }}</p>

    <p>Please <a href="{{ url_for('auth.login') }}">sign in</a> to continue. If you do not have an account, <a href="{{ url_for('auth.register') }}">create one</a>.</p>

    <p style="margin-top:1rem">
      <a class="button" href="{{ url_for('auth.login') }}">Sign in</a>
      <a style="margin-left:.5rem" href="/">Home</a>
    </p>
  </main>
</body>
</html>
